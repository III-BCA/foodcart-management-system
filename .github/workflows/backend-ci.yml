
name: Backend + Frontend CI/CD

on:
  pull_request:
    branches: [ main ]
    paths:
      - foodcart_backend/**
      - foodcart-ui/**

  push:
    branches: [ main ]
    paths:
      - foodcart_backend/**
      - foodcart-ui/**

jobs:
  sonar:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build backend for Sonar
        run: mvn -f foodcart_backend/pom.xml clean install -DskipTests

      - name: Sonar scan
        run: |
          mvn -f foodcart_backend/pom.xml sonar:sonar \
            -Dsonar.projectKey=III-BCA_foodcart-backend \
            -Dsonar.organization=iii-bca \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN1 }}

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Build backend
        run: mvn -f foodcart_backend/pom.xml clean package -DskipTests

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: foodcart-ui
        run: npm ci

      - name: Build frontend
        working-directory: foodcart-ui
        run: npm run build

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure Web App
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_BACKEND_APP_NAME }} \
            --src-path foodcart_backend/target/*.jar

      - name: Deploy frontend to Azure Web App
        run: |
          az webapp deploy \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --name ${{ secrets.AZURE_FRONTEND_APP_NAME }} \
            --src-path foodcart-ui/build


name: Backend CI/CD

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]
    paths:
      - foodcart_backend/**

jobs:

  # 🔹 PR → Sonar
  sonar:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Sonar Scan
        working-directory: foodcart_backend
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=III-BCA_foodcart-backend \
            -Dsonar.organization=iii-bca \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN1 }}

  # 🔥 MAIN → Docker + Deploy
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Docker login
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/foodcart-backend:latest ./foodcart_backend

      # Push image
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/foodcart-backend:latest

      # Deploy to Azure
      - name: Deploy to Azure
        uses: azure/webapps-deploy@v2
        with:
          app-name: foodcart-backend   # ⚠️ backend app name
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/foodcart-backend:latest
name: Frontend CI/CD

on:
  pull_request:
    branches: [ main ]

  push:
    branches: [ main ]

jobs:

  # PR → Sonar only
  sonar:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Build App
        working-directory: foodcart-ui
        run: |
          npm install
          npm run build

      - name: Sonar Scan
        working-directory: foodcart-ui
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=III-BCA_foodcart-management-system \
            -Dsonar.organization=iii-bca \
            -Dsonar.sources=src \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN1 }}

  # MAIN → Docker + Azure Deploy
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Docker login
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Build image
      - name: Build Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/foodcart-frontend:latest ./foodcart-ui

      # Push image
      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/foodcart-frontend:latest

      # Deploy to Azure
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: foodcart-frontend
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: ${{ secrets.DOCKER_USERNAME }}/foodcart-frontend:latest